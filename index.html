<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chaison 的个人主页</title>
    <style>
        /* 全局样式 - 背景已设为深色 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            /* 深色渐变背景，符合您的要求 */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 移除了 .card 样式，所有内容直接在 body 中布局 */

        /* 头像 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px;
            display: block;
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* 姓名 - 浅色 */
        .name {
            font-size: 28px;
            font-weight: 700;
            color: #f0f0f5;
            margin-bottom: 6px;
            text-align: center;
        }

        .title {
            font-size: 16px;
            color: #a8b2ff;
            font-weight: 500;
            margin-bottom: 16px;
            text-align: center;
        }

        /* 分隔线 */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 16px auto;
            border-radius: 4px;
        }

        /* 简介 - 浅色 */
        .bio {
            color: #c8c8d4;
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 24px;
            text-align: center;
            max-width: 400px;
        }

        /* 社交链接按钮 - 深色适配 */
        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            max-width: 500px;
        }

        .links a {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.07);
            color: #e0e0ea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
        }

        .links a:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: transparent;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        /* 底部版权 - 浅色 */
        .footer {
            margin-top: 28px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.55);
            text-decoration: none;
        }

        .footer a:hover {
            color: #a8b2ff;
            text-decoration: underline;
        }

        /* ========== 邮箱弹窗样式（未改动） ========== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: rgba(25, 25, 35, 0.95);
            backdrop-filter: blur(16px);
            padding: 35px 40px 40px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 380px;
            width: 90%;
            position: relative;
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .modal-content .email-icon {
            font-size: 48px;
            margin-bottom: 6px;
        }

        .modal-content .email-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
        }

        .modal-content .email-address {
            font-size: 20px;
            font-weight: 600;
            color: #f0f0f5;
            margin: 8px 0 18px;
            word-break: break-all;
        }

        .modal-content .copy-btn {
            padding: 10px 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .modal-content .copy-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .modal-content .copy-btn:active {
            transform: scale(0.96);
        }

        .close-btn {
            position: absolute;
            top: 14px;
            right: 20px;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.4);
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: #fff;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 手机适配 */
        @media (max-width: 480px) {
            .avatar {
                width: 90px;
                height: 90px;
            }

            .name {
                font-size: 22px;
            }

            .links a {
                padding: 8px 18px;
                font-size: 13px;
            }

            .modal-content {
                padding: 30px 24px 32px;
            }

            .modal-content .email-address {
                font-size: 17px;
            }
        }
    </style>
</head>

<body>

    <!-- 头像 -->
    <img src="https://cdn.luogu.com.cn/upload/image_hosting/24t4nfzv.png" alt="Chaison的头像" class="avatar" />

    <!-- 姓名和头衔 -->
    <h1 class="name">Chaison</h1>

    <div class="divider"></div>

    <!-- 个人简介 -->
    <p class="bio">
        坐标：GD<br />
        年级：六年级<br />
    </p>

    <!-- 社交链接 -->
    <div class="links">
        <a href="https://github.com/Chaison2026" target="_blank">🐙 GitHub</a>
        <a href="#" onclick="openEmailModal(); return false;"> 📧 邮箱</a>
        <a href="https://www.luogu.com.cn/user/1836843" target="_blank">📝 洛谷</a>
        <a href="https://atcoder.jp/users/Chen_Zhen_DY" target="_blank">⚡ AtCoder</a>
        <!-- 新增：指向 Code 子页面的内部链接 -->
        <a href="/Code/" target="_blank">模板题 Code</a>
    </div>

    <!-- 底部 -->
    <div class="footer">
        © 2026 <a href="https://Chaison2026.github.io" target="_blank">Chaison</a> · 用 HTML 构建
    </div>

    <!-- ========== 邮箱弹窗 ========== -->
    <div id="emailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEmailModal()">&times;</span>
            <div class="email-icon">📧</div>
            <div class="email-label">我的邮箱</div>
            <div class="email-address">chen_zhen2026@126.com</div>
            <button class="copy-btn" onclick="copyEmail()">📋 复制邮箱</button>
        </div>
    </div>

    <!-- ========== JavaScript ========== -->
    <script>
        function openEmailModal() {
            document.getElementById('emailModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeEmailModal() {
            document.getElementById('emailModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function copyEmail() {
            const email = 'chen_zhen2026@126.com';
            navigator.clipboard.writeText(email).then(() => {
                const modalContent = document.querySelector('.modal-content');
                modalContent.innerHTML = `
                    <div style="padding: 20px 0;">
                        <div style="font-size: 56px; margin-bottom: 10px;">✅</div>
                        <div style="font-size: 20px; font-weight: 600; color: #f0f0f5; margin-bottom: 6px;">已复制！</div>
                        <div style="font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 20px;">${email}</div>
                        <button class="copy-btn" onclick="closeEmailModal()" style="background: linear-gradient(135deg, #667eea, #764ba2); padding: 10px 32px; color: white; border: none; border-radius: 50px; font-size: 16px; cursor: pointer;">我知道了</button>
                    </div>
                `;
                const closeBtn = document.querySelector('.close-btn');
                if (closeBtn) closeBtn.style.display = 'none';
            }).catch(() => {
                alert('复制失败，请手动复制：chen_zhen2026@126.com');
            });
        }

        window.onclick = function (event) {
            var modal = document.getElementById('emailModal');
            if (event.target == modal) {
                closeEmailModal();
            }
        }

        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                closeEmailModal();
            }
        });
    </script>

</body>

</html>
