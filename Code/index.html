<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chaison 的代码空间</title>
    <style>
        /* 全局样式 - 与主页保持一致 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .content {
            text-align: center;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            color: #f0f0f5;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: 18px;
            color: #a8b2ff;
            margin-bottom: 24px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 0 auto 28px;
            border-radius: 4px;
        }

        .description {
            color: #c8c8d4;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 32px;
        }

        .back-link {
            display: inline-block;
            padding: 12px 32px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.07);
            color: #e0e0ea;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .back-link:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-color: transparent;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
        }

        .footer a {
            color: rgba(255, 255, 255, 0.55);
            text-decoration: none;
        }

        .footer a:hover {
            color: #a8b2ff;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 28px;
            }

            .subtitle {
                font-size: 16px;
            }

            .description {
                font-size: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="content">
        <h1>各类模板题代码</h1>
        <p class="subtitle"></p>
        <div class="divider"></div>
        <p class="description">
            <br />
        </p>
        <a href="/" class="back-link">返回主页</a>
        <div class="footer">
            © 2026 <a href="https://Chaison2026.github.io" target="_blank">Chaison</a> · 用 HTML 构建
        </div>
    </div>

</body>

</html>
